name: SEO Agent
on:
  schedule:
    - cron: '0 7 * * 3'
  workflow_dispatch:

jobs:
  seo:
    name: SEO Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run SEO Agent
        run: node scripts/seo-agent.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Commit SEO report
        env:
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
        run: |
          git config --global user.name "LRA SEO Agent"
          git config --global user.email "seo@lracloudops.com"
          BRANCH="agent/seo-$(date +%Y-%m-%d)"
          git checkout -b $BRANCH
          git add -A
          if git diff --staged --quiet; then
            echo "No SEO changes"
            exit 0
          fi
          git commit -m "chore(seo): weekly SEO analysis $(date +%Y-%m-%d)"
          git push origin $BRANCH
          gh pr create \
            --title "🔍 SEO Analysis: $(date +%Y-%m-%d)" \
            --body "Weekly SEO analysis by LRA SEO Agent." \
            --base main \
            --head $BRANCH
          PR=$(gh pr list --head $BRANCH --json number -q '.[0].number')
          [ -n "$PR" ] && gh pr merge $PR --auto --squash
