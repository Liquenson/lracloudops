name: Uptime Monitor
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  uptime:
    name: Check Site Uptime
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run uptime check
        run: node scripts/uptime-agent.mjs
        continue-on-error: true

      - name: Save uptime log
        env:
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
        run: |
          git config --global user.name "LRA Uptime Agent"
          git config --global user.email "uptime@lracloudops.com"
          git add scripts/uptime-log.json 2>/dev/null || true
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "chore(uptime): log $(date +%Y-%m-%d-%H%M) [skip ci]"
          git push origin main || true

      - name: Report
        if: always()
        run: |
          echo "## Uptime Check $(date)" >> $GITHUB_STEP_SUMMARY
          echo "Site: https://lracloudops.com" >> $GITHUB_STEP_SUMMARY
