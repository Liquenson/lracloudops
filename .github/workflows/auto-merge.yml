name: Auto Merge
on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    name: Auto merge when checks pass
    runs-on: ubuntu-latest
    if: github.actor == 'Liquenson' || github.actor == 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Auto merge PR
        env:
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo ${{ github.repository }} \
            --state open \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("feat/") or startswith("agent/")) | .number' \
            | head -1)

          if [ -n "$PR_NUMBER" ]; then
            echo "Activando auto-merge en PR #$PR_NUMBER"
            gh pr merge $PR_NUMBER \
              --auto \
              --squash \
              --repo ${{ github.repository }}
          else
            echo "No hay PRs elegibles para auto-merge"
          fi
