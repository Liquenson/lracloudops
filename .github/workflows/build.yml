name: Build & Validate

on:
  push:
    branches: [main, feat/**, fix/**, chore/**]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Astro Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Auto-fix formatting
        run: |
          npx prettier --write "src/**/*.{astro,ts,css}"
          git diff --exit-code || (
            git config --global user.name "LRA CI Bot"
            git config --global user.email "ci@lracloudops.com"
            git add -A
            git commit -m "style: auto-fix prettier formatting [skip ci]"
            git push
          )
        env:
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}

      - name: Type check
        run: npx astro check

      - name: Type check Cloudflare Functions
        run: npx tsc --project functions/tsconfig.json

      - name: Build
        run: npm run build

      - name: Verify output exists
        run: |
          if [ ! -d "dist" ]; then
            echo "Build output directory 'dist' not found"
            exit 1
          fi
          echo "Build output verified: $(ls dist | wc -l) files"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: dist
          path: dist/
          retention-days: 30

      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Deploy is handled automatically by Cloudflare Pages
      # via direct GitHub integration — no wrangler deploy needed.
      # Every merge to main triggers an automatic deployment.
