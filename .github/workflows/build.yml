name: Build & Validate
on:
  push:
    branches: [main, v3/clean-slate]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Astro Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Lint (warn-only)
        run: npm run lint || true
      - name: Type check
        run: npx astro check
      - name: Build
        run: npm run build
      - name: Check pages
        run: |
          PAGES=$(find dist -name "*.html" | wc -l)
          echo "✅ $PAGES pages built" >> $GITHUB_STEP_SUMMARY
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        env:
          CI: true
