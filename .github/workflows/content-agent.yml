name: Content Repurposing Agent

on:
  workflow_run:
    workflows: ["Daily Maintenance Agent"]
    types: [completed]
  workflow_dispatch:

jobs:
  repurpose:
    name: Repurpose Latest Blog Post
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_GITHUB_TOKEN || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Content Repurposing Agent
        run: node scripts/content-agent.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit content log
        env:
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN || github.token }}
        run: |
          git config --global user.name "LRA Content Agent"
          git config --global user.email "content@lracloudops.com"
          git add scripts/content-log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore(content): repurpose blog post $(date +%Y-%m-%d) [skip ci]"
          git push origin HEAD || true
