name: Auto Error Fix
on:
  workflow_run:
    workflows: ["Build & Validate"]
    types: [completed]
  schedule:
    - cron: '30 */4 * * *'
  workflow_dispatch:

jobs:
  fix:
    name: Auto Fix Errors
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event_name != 'workflow_run' }}
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Auto-fix Prettier
        run: npx prettier --write "src/**/*.{astro,ts,css}" || true

      - name: Run Error Fix Agent
        run: node scripts/error-fix-agent.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Build verification
        run: npm run build

      - name: Commit fixes if any
        env:
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
        run: |
          git config --global user.name "LRA Error Fix Agent"
          git config --global user.email "fix@lracloudops.com"
          BRANCH="agent/error-fix-$(date +%Y-%m-%d-%H%M)"
          git checkout -b $BRANCH
          git add -A
          if git diff --staged --quiet; then
            echo "No fixes needed"
            exit 0
          fi
          git commit -m "fix(agent): auto-fix errors $(date +%Y-%m-%d)"
          git push origin $BRANCH
          gh pr create \
            --title "🔧 Auto-fix: $(date +%Y-%m-%d)" \
            --body "Automatic error correction by LRA Error Fix Agent." \
            --base main \
            --head $BRANCH
          PR=$(gh pr list --head $BRANCH --json number -q '.[0].number')
          [ -n "$PR" ] && gh pr merge $PR --auto --squash
