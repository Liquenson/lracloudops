name: Dependencies Update
on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  update:
    name: Update Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Security audit fix
        run: npm audit fix --audit-level=high || true

      - name: Run Dependencies Agent
        run: node scripts/deps-agent.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Build verification
        run: npm run build

      - name: Commit and PR if changes
        env:
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
        run: |
          git config --global user.name "LRA Deps Agent"
          git config --global user.email "deps@lracloudops.com"
          BRANCH="agent/deps-$(date +%Y-%m-%d)"
          git checkout -b $BRANCH
          git add -A
          if git diff --staged --quiet; then
            echo "No dependency changes"
            exit 0
          fi
          git commit -m "chore(deps): auto-update $(date +%Y-%m-%d)"
          git push origin $BRANCH
          gh pr create \
            --title "📦 Deps update: $(date +%Y-%m-%d)" \
            --body "Automatic dependency update. Build verified." \
            --base main \
            --head $BRANCH
          PR=$(gh pr list --head $BRANCH --json number -q '.[0].number')
          [ -n "$PR" ] && gh pr merge $PR --auto --squash
