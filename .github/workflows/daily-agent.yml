name: Daily Maintenance Agent
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  maintenance:
    name: Daily Site Maintenance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run maintenance agent
        run: node scripts/daily-agent.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Build verification
        run: npm run build

      - name: Create PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
        run: |
          git config --global user.name "LRA Agent"
          git config --global user.email "agent@lracloudops.com"

          BRANCH="agent/daily-$(date +%Y-%m-%d-%H%M)"
          git checkout -b $BRANCH
          git add -A

          if git diff --staged --quiet; then
            echo "No changes today — skipping PR"
            exit 0
          fi

          git commit -m "chore(agent): daily maintenance $(date +%Y-%m-%d)"
          git push origin $BRANCH

          gh pr create \
            --title "🤖 Daily maintenance $(date +%Y-%m-%d)" \
            --body "## Mantenimiento automático diario

          Generado por LRA Daily Agent a las 9:00 AM.

          ### Cambios incluidos
          - Nuevo artículo de blog en ES y EN
          - Verificación de build completada
          - Log de agente actualizado

          ### Estado
          - Build: ✅ Verificado
          - Páginas: sin errores
          - Auto-generado por: LRA Daily Agent

          > Revisar y mergear cuando sea conveniente." \
            --base main \
            --head $BRANCH

          echo "PR creado para rama $BRANCH"

          PR_NUMBER=$(gh pr list --head $BRANCH --json number -q '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge $PR_NUMBER --auto --squash
            echo "Auto-merge activado en PR #$PR_NUMBER"
          fi
