name: Notify lracloudops.com

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger lracloudops.com rebuild
        run: |
          curl -s -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}" \
            -d '' \
            --max-time 30
          echo "Triggered rebuild of lracloudops.com" >> $GITHUB_STEP_SUMMARY
