name: LRA Orchestrator
on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 15 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: false
        default: 'full'
        type: choice
        options: [full, health-check, weekly-audit]

jobs:
  orchestrate:
    name: Orchestrator
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run orchestrator
        run: node scripts/orchestrator.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TASK: ${{ github.event.inputs.task || 'full' }}

      - name: Auto-fix Prettier
        run: npx prettier --write "src/**/*.{astro,ts,css}" || true

      - name: TypeScript check
        run: npx astro check

      - name: Verify build
        run: |
          npm run build 2>&1
          PAGES=$(find dist -name "*.html" | wc -l)
          echo "✅ $PAGES páginas generadas" >> $GITHUB_STEP_SUMMARY

      - name: Commit and PR if changes
        env:
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
        run: |
          git config --global user.name "LRA Orchestrator"
          git config --global user.email "orchestrator@lracloudops.com"
          BRANCH="agent/orchestrator-$(date +%Y-%m-%d-%H%M)"
          git checkout -b $BRANCH
          git add -A
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore(orchestrator): automated maintenance $(date +%Y-%m-%d)"
          git push origin $BRANCH
          gh pr create \
            --title "🤖 Orchestrator: maintenance $(date +%Y-%m-%d-%H%M)" \
            --body "Automated maintenance by LRA Orchestrator Agent. Prettier fixed, TypeScript clean, build verified." \
            --base main \
            --head $BRANCH
          PR=$(gh pr list --head $BRANCH --json number -q '.[0].number')
          [ -n "$PR" ] && gh pr merge $PR --auto --squash
