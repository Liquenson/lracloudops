name: Weekly Lighthouse Audit

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse CI against production
        run: |
          npm install -g @lhci/cli
          lhci autorun \
            --collect.url=https://lracloudops.com \
            --collect.url=https://lracloudops.com/audit \
            --collect.url=https://lracloudops.com/services \
            --collect.url=https://lracloudops.com/pricing \
            --collect.numberOfRuns=3 \
            --collect.settings.chromeFlags="--no-sandbox" \
            --assert.preset=lighthouse:no-pwa \
            --assert.assertions.categories:performance=["warn",{"minScore":0.80}] \
            --assert.assertions.categories:accessibility=["warn",{"minScore":0.90}] \
            --assert.assertions.categories:seo=["warn",{"minScore":0.90}] \
            --upload.target=temporary-public-storage || echo "Lighthouse warnings detected — review report"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post results summary
        if: always()
        run: |
          echo "## Lighthouse Weekly Report" >> $GITHUB_STEP_SUMMARY
          echo "Scanned: lracloudops.com" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date -u)" >> $GITHUB_STEP_SUMMARY
