<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(147,184,255,0.18)"/>
    </pattern>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E6FFF"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E6FFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A2540" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A2540"/>

  <!-- Dot grid -->
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Radial glow top-right -->
  <ellipse cx="1050" cy="180" rx="420" ry="320" fill="url(#glowGrad)"/>

  <!-- Left accent bar -->
  <rect x="72" y="120" width="4" height="390" rx="2" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Accent pill — top label -->
  <rect x="96" y="128" width="220" height="32" rx="16" fill="rgba(30,111,255,0.2)" stroke="rgba(30,111,255,0.4)" stroke-width="1"/>
  <text x="206" y="149" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#93b8ff" text-anchor="middle" letter-spacing="0.08em">CLOUD INFRASTRUCTURE</text>

  <!-- Main wordmark -->
  <text x="96" y="270" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-0.03em">LRA Cloud Ops</text>

  <!-- Divider line -->
  <rect x="96" y="300" width="520" height="2" rx="1" fill="rgba(30,111,255,0.5)"/>

  <!-- Tagline line 1 -->
  <text x="96" y="356" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="rgba(147,184,255,0.85)" letter-spacing="-0.01em">Cloud Infrastructure · Platform Engineering</text>

  <!-- Tagline line 2 -->
  <text x="96" y="396" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="rgba(147,184,255,0.85)" letter-spacing="-0.01em">DevOps Automation · Kubernetes · AWS</text>

  <!-- Bottom domain -->
  <text x="96" y="478" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="rgba(147,184,255,0.45)" letter-spacing="0.02em">lracloudops.com</text>

  <!-- Right decorative grid lines -->
  <line x1="820" y1="80" x2="820" y2="550" stroke="rgba(30,111,255,0.08)" stroke-width="1"/>
  <line x1="960" y1="80" x2="960" y2="550" stroke="rgba(30,111,255,0.08)" stroke-width="1"/>
  <line x1="1100" y1="80" x2="1100" y2="550" stroke="rgba(30,111,255,0.08)" stroke-width="1"/>
  <line x1="820" y1="200" x2="1160" y2="200" stroke="rgba(30,111,255,0.08)" stroke-width="1"/>
  <line x1="820" y1="340" x2="1160" y2="340" stroke="rgba(30,111,255,0.08)" stroke-width="1"/>
  <line x1="820" y1="480" x2="1160" y2="480" stroke="rgba(30,111,255,0.08)" stroke-width="1"/>

  <!-- Right decorative nodes -->
  <circle cx="820" cy="200" r="5" fill="rgba(30,111,255,0.4)" stroke="rgba(30,111,255,0.6)" stroke-width="1"/>
  <circle cx="960" cy="340" r="5" fill="rgba(30,111,255,0.4)" stroke="rgba(30,111,255,0.6)" stroke-width="1"/>
  <circle cx="1100" cy="200" r="5" fill="rgba(30,111,255,0.4)" stroke="rgba(30,111,255,0.6)" stroke-width="1"/>
  <circle cx="820" cy="480" r="5" fill="rgba(30,111,255,0.4)" stroke="rgba(30,111,255,0.6)" stroke-width="1"/>
  <circle cx="1100" cy="480" r="5" fill="rgba(30,111,255,0.4)" stroke="rgba(30,111,255,0.6)" stroke-width="1"/>

  <!-- Connecting lines between nodes -->
  <line x1="820" y1="200" x2="960" y2="340" stroke="rgba(30,111,255,0.2)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="960" y1="340" x2="1100" y2="200" stroke="rgba(30,111,255,0.2)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="820" y1="480" x2="960" y2="340" stroke="rgba(30,111,255,0.2)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="960" y1="340" x2="1100" y2="480" stroke="rgba(30,111,255,0.2)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Status indicator -->
  <circle cx="96" cy="506" r="5" fill="#10b981"/>
  <text x="110" y="511" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" fill="rgba(16,185,129,0.85)">Available for new projects</text>
</svg>
